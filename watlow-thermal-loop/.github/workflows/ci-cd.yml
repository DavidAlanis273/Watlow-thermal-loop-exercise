# CI/CD Pipeline for Watlow Thermal Loop

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ---- JOB 1: Validate HTML ----
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check HTML structure
        run: |
          echo "Checking HTML files..."
          # Verify index.html exists
          if [ ! -f src/index.html ]; then
            echo "src/index.html not found!"
            exit 1
          fi
          echo "index.html found"

          # Check for required sections
          for section in header hero solutions industries stats footer; do
            if grep -qi "$section" src/index.html; then
              echo "Found section: $section"
            else
              echo "Missing section: $section"
            fi
          done

      - name: Check CSS structure
        run: |
          echo "Checking CSS files..."
          if [ ! -f src/css/styles.css ]; then
            echo "src/css/styles.css not found!"
            exit 1
          fi
          echo "styles.css found ($(wc -l < src/css/styles.css) lines)"

      - name: Check JS structure
        run: |
          echo "Checking JS files..."
          if [ ! -f src/js/main.js ]; then
            echo "src/js/main.js not found!"
            exit 1
          fi
          echo "main.js found ($(wc -l < src/js/main.js) lines)"

      - name: Validate no broken internal links
        run: |
          echo "Checking internal links..."
          # Check that CSS and JS files referenced in HTML exist
          grep -oP 'href="(?!http|#|mailto)([^"]+)"' src/index.html | while read -r link; do
            file=$(echo "$link" | sed 's/href="//;s/"//')
            if [ -f "src/$file" ]; then
              echo "Link OK: $file"
            else
              echo "Link may be broken: $file"
            fi
          done

  # ---- JOB 2: Deploy to GitHub Pages ----
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
